name: Feature request
description: Suggest an improvement to relay-cli
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What pain point are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want and how you'd use it
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, mockups, or examples from similar tools
